name: Check current tag with Sisyphus
on:
  schedule:
    - cron: "45 4 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: als-tiny
    container:
      image: altlinux.space/actions/runner/containers:sisyphus
    steps:
      - name: Run check versions
        uses: alterator/workflows/workflows/version-check@master
        with:
          RECIPIENT_EMAIL: ${{ vars.RECIPIENT_EMAIL }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
